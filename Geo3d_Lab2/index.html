<!doctype html>
<html lang="vi">
        <head>

                <title>3D Models - GEO3D Lab</title>
                <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />

                <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
                <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
                <script src="https://unpkg.com/three@0.147.0/build/three.min.js"></script>

                <style>

                                top: 0;
                                bottom: 0;
                                width: 100%;
                        }
                </style>
        </head>
        <body>
                <div id="map"></div>
                <script>
                        // ============================================================
                        //  DANH SÁCH MODELS
                        // ============================================================
                        const MODEL_LIST = [
                                {
                                        name: "BK",
                                        jsonPath: "db1ff9eb-9874-44e2-a396-3fba7ea6e59f.json",
                                        settings: {
                                                lng: 106.80250000000001,
                                                lat: 10.879000000000001,
                                                altitude: 0,
                                                rotateX: 1.56,
                                                rotateY: 5.71,
                                                rotateZ: 0,
                                                scale: 0.001,
                                        },
                                },

                                {
                                        name: "UIT-E",
                                        jsonPath: "fe3328c6-39e7-4503-ba54-2b16bd3c8102.json",
                                        settings: {
                                                lng: 106.80265000000001,
                                                lat: 10.869900000000001,
                                                altitude: 0,
                                                rotateX: 1.6,
                                                rotateY: 1.64,
                                                rotateZ: 0,
                                                scale: 0.02,
                                        },
                                },

                                {
                                        name: "NongLam-CatTuong",
                                        jsonPath: "a1cd100f-1ec8-4f45-aba2-227ee4b0d6f0.json",
                                        settings: {
                                                lng: 106.79026,
                                                lat: 10.87337,
                                                altitude: 0,
                                                rotateX: 1.56,
                                                rotateY: 6.05,
                                                rotateZ: 0,
                                                scale: 0.0008,
                                        },
                                },

                                {
                                        name: "KHTN",
                                        jsonPath: "6ffc3d7e-7a4b-424d-bff5-fae455334095.json",
                                        settings: {
                                                lng: 106.79508,
                                                lat: 10.87961,
                                                altitude: 0,
                                                rotateX: 1.54,
                                                rotateY: 6.28,
                                                rotateZ: 0,
                                                scale: 0.0227,
                                                ambientIntensity: 0.2,
                                                directIntensity: 1,
                                        },
                                },

                                {
                                        name: "NongLam-HuongDuong",
                                        jsonPath: "a1cd100f-1ec8-4f45-aba2-227ee4b0d6f1.json",
                                        settings: {
                                                lng: 106.79026,
                                                lat: 10.87366,
                                                altitude: 0,
                                                rotateX: 1.56,
                                                rotateY: 6.05,
                                                rotateZ: 0,
                                                scale: 0.0008,
                                                ambientIntensity: 0.8,
                                                directIntensity: 0.8,
                                        },
                                },

                                {
                                        name: "VienKhoaHocSucKhoe",
                                        jsonPath: "3dad4455-53e5-4bf7-a10d-02ee778d038c.json",
                                        settings: {
                                                lng: 106.78958,
                                                lat: 10.87196,
                                                altitude: 0,
                                                rotateX: 1.58,
                                                rotateY: 4.01,
                                                rotateZ: 0,
                                                scale: 0.031,
                                                ambientIntensity: 0.8,
                                                directIntensity: 2.3,
                                        },
                                },
                                {
                                        name: "Đại học Nông Lâm giảng đường B",
                                        jsonPath: "98fcfe06-09d8-43b1-8c97-1511d94dfd19.json",
                                        settings: {
                                                lng: 106.78934,
                                                lat: 10.87277,
                                                altitude: 0,
                                                rotateX: 1.56,
                                                rotateY: 6.11,
                                                rotateZ: 0,
                                                scale: 0.037,
                                                ambientIntensity: 0.5,
                                                directIntensity: 1.3,
                                        },
                                },

                                {
                                        name: "Tòa B4 KTX Khu B",
                                        jsonPath: "ktx.json",
                                        settings: {
                                                lng: 106.78309,
                                                lat: 10.88278,
                                                altitude: 5,
                                                rotateX: 1.63,
                                                rotateY: 0.65,
                                                rotateZ: 0,
                                                scale: 10,
                                                ambientIntensity: 0.5,
                                                directIntensity: 1.3,
                                        },
                                },
                        ];
                        // ============================================================

                        // ============================================================
                        //  JSON 3D MODEL LOADER
                        // ============================================================
                        class JSONModelLoader {
                                async loadJSON(path) {
                                        const response = await fetch(path);
                                        if (!response.ok) throw new Error(`Failed to load JSON: ${path}`);
                                        return await response.json();
                                }

                                createGeometryClassic(data) {
                                        const geometry = new THREE.BufferGeometry();

                                        const vertices = new Float32Array(data.vertices.length * 3);
                                        data.vertices.forEach((v, i) => {
                                                vertices[i * 3] = v.x;
                                                vertices[i * 3 + 1] = v.y;
                                                vertices[i * 3 + 2] = v.z;
                                        });
                                        geometry.setAttribute("position", new THREE.BufferAttribute(vertices, 3));

                                        if (data.normals && data.normals.length > 0) {
                                                const normals = new Float32Array(data.vertices.length * 3);
                                                data.normals.forEach((n, i) => {
                                                        if (i < data.vertices.length) {
                                                                normals[i * 3] = n.x;
                                                                normals[i * 3 + 1] = n.y;
                                                                normals[i * 3 + 2] = n.z;
                                                        }
                                                });
                                                geometry.setAttribute("normal", new THREE.BufferAttribute(normals, 3));
                                        } else {
                                                geometry.computeVertexNormals();
                                        }

                                        const materialNames = Array.from(
                                                new Set(data.faces.map((f) => f.material || "default")),
                                        );
                                        const matIndexMap = {};
                                        materialNames.forEach((name, i) => (matIndexMap[name] = i));

                                        const indicesPerMat = materialNames.map(() => []);
                                        data.faces.forEach((face) => {
                                                const mIndex = matIndexMap[face.material || "default"];
                                                if (face.vertices && face.vertices.length >= 3) {
                                                        for (let i = 1; i < face.vertices.length - 1; i++) {
                                                                indicesPerMat[mIndex].push(face.vertices[0]);
                                                                indicesPerMat[mIndex].push(face.vertices[i]);
                                                                indicesPerMat[mIndex].push(face.vertices[i + 1]);
                                                        }
                                                }
                                        });

                                        let total = [];
                                        let offset = 0;
                                        indicesPerMat.forEach((arr, matIdx) => {
                                                if (arr.length > 0) {
                                                        total = total.concat(arr);
                                                        geometry.addGroup(offset, arr.length, matIdx);
                                                        offset += arr.length;
                                                }
                                        });

                                        if (total.length > 0) {
                                                geometry.setIndex(new THREE.BufferAttribute(new Uint32Array(total), 1));
                                        }

                                        return { geometry, materialNames };
                                }

                                createGeometry(data) {
                                        const geometry = new THREE.BufferGeometry();

                                        const materialNames = Array.from(new Set(data.faces.map((f) => f.material || "default")));
                                        const matIndexMap = {};
                                        materialNames.forEach((name, i) => (matIndexMap[name] = i));

                                        const dedupMap = new Map();
                                        const outPositions = [];
                                        const outNormals = [];
                                        const outUvs = [];
                                        let hasAnyNormal = false;
                                        let hasAnyUv = false;

                                        function getOrCreateVertex(vIdx, vtIdx, vnIdx) {
                                                const key = `${vIdx}/${vtIdx ?? -1}/${vnIdx ?? -1}`;
                                                if (dedupMap.has(key)) return dedupMap.get(key);

                                                const sourceVertex = data.vertices[vIdx] || { x: 0, y: 0, z: 0 };
                                                outPositions.push(sourceVertex.x, sourceVertex.y, sourceVertex.z);

                                                const sourceNormal = vnIdx != null && data.normals && data.normals[vnIdx] ? data.normals[vnIdx] : null;
                                                if (sourceNormal) {
                                                        outNormals.push(sourceNormal.x, sourceNormal.y, sourceNormal.z);
                                                        hasAnyNormal = true;
                                                } else {
                                                        outNormals.push(0, 0, 0);
                                                }

                                                const sourceUv = vtIdx != null && data.textures && data.textures[vtIdx] ? data.textures[vtIdx] : null;
                                                if (sourceUv) {
                                                        outUvs.push(sourceUv.u, sourceUv.v);
                                                        hasAnyUv = true;
                                                } else {
                                                        outUvs.push(0, 0);
                                                }

                                                const createdIndex = outPositions.length / 3 - 1;
                                                dedupMap.set(key, createdIndex);
                                                return createdIndex;
                                        }

                                        const indicesPerMat = materialNames.map(() => []);
                                        data.faces.forEach((face) => {
                                                const mIndex = matIndexMap[face.material || "default"];
                                                const faceVertices = face.vertices || [];
                                                if (faceVertices.length < 3) return;

                                                for (let i = 1; i < faceVertices.length - 1; i++) {
                                                        const tri = [0, i, i + 1];
                                                        tri.forEach((corner) => {
                                                                const vIdx = faceVertices[corner];
                                                                const vtIdx = face.textures && face.textures.length > corner ? face.textures[corner] : null;
                                                                const vnIdx = face.normals && face.normals.length > corner ? face.normals[corner] : null;
                                                                const idx = getOrCreateVertex(vIdx, vtIdx, vnIdx);
                                                                indicesPerMat[mIndex].push(idx);
                                                        });
                                                }
                                        });

                                        geometry.setAttribute("position", new THREE.BufferAttribute(new Float32Array(outPositions), 3));
                                        if (hasAnyUv) {
                                                geometry.setAttribute("uv", new THREE.BufferAttribute(new Float32Array(outUvs), 2));
                                        }

                                        let total = [];
                                        let offset = 0;
                                        indicesPerMat.forEach((arr, matIdx) => {
                                                if (arr.length > 0) {
                                                        total = total.concat(arr);
                                                        geometry.addGroup(offset, arr.length, matIdx);
                                                        offset += arr.length;
                                                }
                                        });

                                        if (total.length > 0) {
                                                geometry.setIndex(new THREE.BufferAttribute(new Uint32Array(total), 1));
                                        }

                                        if (hasAnyNormal) {
                                                geometry.setAttribute("normal", new THREE.BufferAttribute(new Float32Array(outNormals), 3));
                                        } else {
                                                geometry.computeVertexNormals();
                                        }

                                        return { geometry, materialNames };
                                }

                                async load(path) {
                                        const data = await this.loadJSON(path);
                                        const isKtxModel = path.endsWith("ktx.json");
                                        const result = isKtxModel ? this.createGeometry(data) : this.createGeometryClassic(data);
                                        const geometry = result.geometry;
                                        const materialNames = result.materialNames || ["default"];
                                        const textureLoader = new THREE.TextureLoader();
                                        const jsonUrl = new URL(path, window.location.href);

                                        const materials = await Promise.all(materialNames.map(async (name) => {
                                                const props = (data.material_props && data.material_props[name]) || {};
                                                let color = 0x888888;
                                                if (props.Kd) {
                                                        const r = Math.min(1, Math.max(0, props.Kd[0]));
                                                        const g = Math.min(1, Math.max(0, props.Kd[1]));
                                                        const b = Math.min(1, Math.max(0, props.Kd[2]));
                                                        color = (Math.round(r * 255) << 16) | (Math.round(g * 255) << 8) | Math.round(b * 255);
                                                }
                                                if (!isKtxModel) {
                                                        return new THREE.MeshPhongMaterial({ color, side: THREE.DoubleSide, flatShading: true });
                                                }

                                                const usePBR = props.metallicFactor !== undefined || props.roughnessFactor !== undefined;
                                                const matOpts = {
                                                        color,
                                                        side: props.doubleSided ? THREE.DoubleSide : THREE.FrontSide,
                                                        flatShading: !props.map_Kd,
                                                };
                                                const material = usePBR
                                                        ? new THREE.MeshStandardMaterial({
                                                                  ...matOpts,
                                                                  metalness: props.metallicFactor ?? 0,
                                                                  roughness: props.roughnessFactor ?? 1,
                                                          })
                                                        : new THREE.MeshPhongMaterial(matOpts);

                                                if (props.map_Kd) {
                                                        try {
                                                                const textureUrl = new URL(props.map_Kd, jsonUrl).href;
                                                                const texture = await new Promise((resolve, reject) => {
                                                                        textureLoader.load(textureUrl, resolve, undefined, reject);
                                                                });

                                                                if (THREE.SRGBColorSpace && "colorSpace" in texture) {
                                                                        texture.colorSpace = THREE.SRGBColorSpace;
                                                                } else if (THREE.sRGBEncoding !== undefined) {
                                                                        texture.encoding = THREE.sRGBEncoding;
                                                                }

                                                                texture.flipY = props.map_Kd_flipY === false ? false : true;
                                                                material.map = texture;
                                                                material.flatShading = false;
                                                                material.needsUpdate = true;
                                                        } catch (error) {
                                                                console.warn(`Failed to load texture for ${name}:`, error);
                                                        }
                                                }

                                                return material;
                                        }));

                                        const mesh = new THREE.Mesh(
                                                geometry,
                                                materials.length === 1 ? materials[0] : materials,
                                        );
                                        return mesh;
                                }
                        }

                        const jsonLoader = new JSONModelLoader();

                        const centerLng = MODEL_LIST.reduce((s, m) => s + m.settings.lng, 0) / MODEL_LIST.length;
                        const centerLat = MODEL_LIST.reduce((s, m) => s + m.settings.lat, 0) / MODEL_LIST.length;

                        const map = new maplibregl.Map({
                                container: "map",
                                style: "https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
                                center: [centerLng, centerLat],
                                zoom: 17,
                                pitch: 60,
                                antialias: true,
                        });

                        const entries = [];

                        const masterLayer = {
                                id: "3d-models",
                                type: "custom",
                                renderingMode: "3d",

                                onAdd(map, gl) {
                                        this.camera = new THREE.Camera();
                                        this.renderer = new THREE.WebGLRenderer({
                                                canvas: map.getCanvas(),
                                                context: gl,
                                                antialias: true,
                                        });
                                        this.renderer.autoClear = false;

                                        MODEL_LIST.forEach((cfg) => {
                                                const s = cfg.settings;
                                                const scene = new THREE.Scene();

                                                let ambientIntensity = s.ambientIntensity ?? 2;
                                                let directIntensity = s.directIntensity ?? 2;

                                                if (cfg.name === "UIT-E") {
                                                        ambientIntensity = 0.8;
                                                        directIntensity = 0.4;
                                                } else if (cfg.name === "BK") {
                                                        ambientIntensity = 0.6;
                                                        directIntensity = 0.7;
                                                } else if (cfg.name === "NongLam-CatTuong") {
                                                        ambientIntensity = 0.8;
                                                        directIntensity = 0.8;
                                                } else if (cfg.jsonPath === "ktx.json") {
                                                        ambientIntensity = 0.5;
                                                        directIntensity = 1.3;
                                                }

                                                const ambientLight = new THREE.AmbientLight(0xffffff, ambientIntensity);
                                                scene.add(ambientLight);

                                                const directionalLight = new THREE.DirectionalLight(0xffffff, directIntensity);
                                                directionalLight.position.set(0, -70, 100).normalize();
                                                scene.add(directionalLight);

                                                const entry = {
                                                        scene,
                                                        settings: s,
                                                        mesh: null,
                                                        mercator: maplibregl.MercatorCoordinate.fromLngLat(
                                                                [s.lng, s.lat],
                                                                s.altitude,
                                                        ),
                                                };

                                                s.ambientIntensity = ambientIntensity;
                                                s.directIntensity = directIntensity;
                                                entry.ambientLight = ambientLight;
                                                entry.directionalLight = directionalLight;

                                                entry.refreshMercator = function () {
                                                        this.mercator = maplibregl.MercatorCoordinate.fromLngLat(
                                                                [s.lng, s.lat],
                                                                s.altitude,
                                                        );
                                                };

                                                jsonLoader
                                                        .load(cfg.jsonPath)
                                                        .then((mesh) => {
                                                                entry.mesh = mesh;
                                                                scene.add(mesh);
                                                        })
                                                        .catch((err) => {
                                                                console.error(`[${cfg.name}] Lỗi tải JSON:`, err);
                                                        });

                                                entries.push(entry);
                                        });

                                        this.map = map;
                                },

                                render(gl, matrix) {
                                        entries.forEach((entry) => {
                                                const s = entry.settings;
                                                const mc = entry.mercator;

                                                if (entry.mesh) {
                                                        entry.mesh.scale.set(s.scale, s.scale, s.scale);
                                                }

                                                const rotationX = new THREE.Matrix4().makeRotationAxis(
                                                        new THREE.Vector3(1, 0, 0),
                                                        s.rotateX,
                                                );
                                                const rotationY = new THREE.Matrix4().makeRotationAxis(
                                                        new THREE.Vector3(0, 1, 0),
                                                        s.rotateY,
                                                );
                                                const rotationZ = new THREE.Matrix4().makeRotationAxis(
                                                        new THREE.Vector3(0, 0, 1),
                                                        s.rotateZ,
                                                );

                                                const m = new THREE.Matrix4().fromArray(matrix);
                                                const l = new THREE.Matrix4()
                                                        .makeTranslation(mc.x, mc.y, mc.z)
                                                        .scale(
                                                                new THREE.Vector3(
                                                                        mc.meterInMercatorCoordinateUnits(),
                                                                        -mc.meterInMercatorCoordinateUnits(),
                                                                        mc.meterInMercatorCoordinateUnits(),
                                                                ),
                                                        )
                                                        .multiply(rotationX)
                                                        .multiply(rotationY)
                                                        .multiply(rotationZ);

                                                this.camera.projectionMatrix = m.multiply(l);
                                                this.renderer.resetState();
                                                this.renderer.render(entry.scene, this.camera);
                                        });

                                        this.map.triggerRepaint();
                                },
                        };

                        map.on("load", () => {
                                map.addLayer(masterLayer);
                        });
                </script>
        </body>
</html>
